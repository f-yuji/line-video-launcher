services:
  - type: web
    name: line-video-launcher
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      # LINE
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # OpenAI
      - key: OPENAI_API_KEY
        sync: false
      # Gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL_ID
        value: gemini-2.5-flash-lite
      # ElevenLabs
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      # X (Twitter)
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_TOKEN_SECRET
        sync: false
      # YouTube
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_REFRESH_TOKEN
        sync: false
      # 素材動画 URL（Supabase Storage の公開 URL）
      - key: RAW_VIDEO_URL
        sync: false
      - key: RAW_SE_URL
        sync: false
